# Reusable Workflows see: https://github.com/entur/gha-security/blob/main/README-code-scan.md

name: CodeQL Scan

on:
  pull_request:
    branches:
      - "main"
  push:
    branches:
      - "main"
  schedule:
    - cron: "0 2 * * WED" # Run Wednesday at 2AM UTC

jobs:
  code-scan:
    name: CodeQL Scan
    uses: entur/gha-security/.github/workflows/code-scan.yml@v2
    # no secrets necessary
    permissions:
      packages: read
      security-events: write
      actions: read
      contents: write
      issues: write
      pull-requests: write
